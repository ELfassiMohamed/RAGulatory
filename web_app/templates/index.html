<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Reglementaire</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div style="padding:20px;max-width:900px;margin:0 auto;">

    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0;">Verification Reglementaire</h2>
        <button class="btn-confirm" onclick="document.getElementById('taxoModal').style.display='flex'">
            Nouvelle analyse
        </button>
    </div>

    <!-- Taxonomie Modal -->
    <div class="modal-overlay" id="taxoModal" style="display:none;">
        <div class="modal" style="width:800px;max-width:95vw;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="margin:0;">Analyse Terrain > Plans > Conformite</h3>
                <button class="btn-cancel" style="padding:4px 12px;" onclick="document.getElementById('taxoModal').style.display='none'">&times;</button>
            </div>

            <div style="margin-bottom:16px;">
                <div style="display:flex;gap:8px;flex-direction:column;">
                    <textarea id="taxoRecomQuery" rows="3" placeholder="Decrivez le terrain : surface, localisation, budget..." style="flex:1;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;resize:vertical;font-family:inherit;"></textarea>
                    <button class="btn-confirm" style="background:#2563eb;" onclick="recommendTaxonomie()" id="btnRecomRun">Analyser</button>
                </div>
            </div>
            <div id="taxoRecomLoader" style="display:none;text-align:center;padding:20px;color:#6b7280;">
                <div class="typing-bubble"><span></span><span></span><span></span></div>
                <div style="margin-top:8px;font-size:13px;">Analyse en cours (RAG + ML + MCDM)...</div>
            </div>
            <div id="taxoRecomResult" style="display:none;max-height:480px;overflow-y:auto;padding-right:4px;"></div>

            <div class="modal-actions" style="margin-top:16px;">
                <button class="btn-cancel" onclick="document.getElementById('taxoModal').style.display='none'">Fermer</button>
            </div>
        </div>
    </div>

</div>

<script>
function escapeHtml(text) {
    if (!text) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
}

function recommendTaxonomie() {
    var query = document.getElementById('taxoRecomQuery').value.trim();
    if (!query) { alert('Veuillez decrire le terrain.'); return; }
    document.getElementById('taxoRecomLoader').style.display = 'block';
    document.getElementById('taxoRecomResult').style.display = 'none';
    document.getElementById('btnRecomRun').disabled = true;
    fetch('/api/taxonomie/recommend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ query: query, method: 'wsm' })
    }).then(function(r){ return r.json(); }).then(function(data){
        document.getElementById('taxoRecomLoader').style.display = 'none';
        document.getElementById('btnRecomRun').disabled = false;
        if (data.error) {
            document.getElementById('taxoRecomResult').innerHTML = '<p style="color:#ef4444;">' + escapeHtml(data.error) + '</p>';
            document.getElementById('taxoRecomResult').style.display = 'block';
            return;
        }
        var html = '';

        // Resume terrain
        var t = data.terrain || {};
        html += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;margin-bottom:16px;">' +
            '<strong style="font-size:15px;">Terrain</strong>' +
            '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:14px;">';
        if (t.surface_m2) html += '<span style="background:#e0f2fe;padding:5px 14px;border-radius:14px;">' + t.surface_m2 + ' m²</span>';
        if (t.localisation) html += '<span style="background:#e0f2fe;padding:5px 14px;border-radius:14px;">' + escapeHtml(t.localisation) + '</span>';
        if (t.usage_souhaite) html += '<span style="background:#e0f2fe;padding:5px 14px;border-radius:14px;">' + escapeHtml(t.usage_souhaite) + '</span>';
        if (t.budget_estime_dh) html += '<span style="background:#e0f2fe;padding:5px 14px;border-radius:14px;">Budget: ' + t.budget_estime_dh.toLocaleString('fr-FR') + ' DH</span>';
        html += '</div></div>';

        // Plans en grille
        var plans = data.plans || [];
        if (plans.length === 0) {
            html += '<p style="color:#6b7280;font-size:14px;">Aucun plan genere.</p>';
        } else {
            html += '<div style="display:flex;flex-wrap:wrap;gap:14px;">';
            plans.forEach(function(p, i){
                var rankColors = ['#fbbf24','#9ca3af','#d97706','#6b7280','#6b7280'];
                var rankColor = rankColors[i] || '#6b7280';
                var isRec = p.mcdm_recommended;
                var borderColor = isRec ? '#059669' : '#e5e7eb';

                html += '<div style="flex:1 1 calc(50% - 7px);min-width:280px;background:#fff;border:2px solid ' + borderColor + ';border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">';

                // Header: rang + nom + score MCDM
                html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">' +
                    '<div><span style="font-weight:700;font-size:16px;">#' + p.rank + ' ' + escapeHtml(p.name) + '</span>' +
                    (isRec ? '<span style="background:#059669;color:#fff;padding:3px 10px;border-radius:8px;font-size:11px;margin-left:8px;font-weight:600;">RECOMMANDE</span>' : '') +
                    '</div>' +
                    '<div style="background:' + rankColor + ';color:#fff;font-weight:800;font-size:22px;padding:4px 14px;border-radius:14px;line-height:1.2;text-align:center;">' + (p.mcdm_score * 100).toFixed(0) + '%</div></div>';

                // Description
                html += '<div style="font-size:14px;color:#4b5563;margin-bottom:10px;line-height:1.4;">' + escapeHtml(p.description || '') + '</div>';

                // Details techniques
                html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:13px;">';
                if (p.type) html += '<span style="background:#f3f4f6;padding:4px 12px;border-radius:10px;">' + escapeHtml(p.type) + '</span>';
                if (p.nb_etages) html += '<span style="background:#f3f4f6;padding:4px 12px;border-radius:10px;">' + p.nb_etages + ' etages</span>';
                if (p.surface_utile_m2) html += '<span style="background:#f3f4f6;padding:4px 12px;border-radius:10px;">' + p.surface_utile_m2 + ' m² utiles</span>';
                if (p.cout_estime_dh) html += '<span style="background:#f3f4f6;padding:4px 12px;border-radius:10px;">' + Number(p.cout_estime_dh).toLocaleString('fr-FR') + ' DH</span>';
                if (p.delai_mois) html += '<span style="background:#f3f4f6;padding:4px 12px;border-radius:10px;">' + p.delai_mois + ' mois</span>';
                html += '</div>';

                // Poids MCDM
                var cv = p.criteria_values || {};
                var wm = data.mcdm && data.mcdm.weights_used ? data.mcdm.weights_used : {};
                var labels = {
                    surface_utilisable: 'Surface', cout_estime: 'Cout', conformite_reglementaire: 'Conformite',
                    faisabilite_technique: 'Faisabilite', delai_realisation: 'Delai', ml_viability_score: 'ML'
                };
                html += '<div style="margin-bottom:10px;">';
                html += '<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;">Poids MCDM</div>';
                Object.keys(cv).forEach(function(k){
                    var w = wm[k] || 0;
                    var v = cv[k];
                    var maxVal = k === 'cout_estime' ? 10000000 : (k === 'delai_realisation' ? 60 : (k === 'surface_utilisable' ? 1000 : 10));
                    var pct = Math.min(100, Math.round((v / maxVal) * 100));
                    var barColor = k === 'conformite_reglementaire' ? '#059669' : (k === 'cout_estime' ? '#ef4444' : (k === 'delai_realisation' ? '#f59e0b' : '#3b82f6'));
                    html +=
                        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">' +
                            '<span style="font-size:12px;color:#6b7280;width:85px;flex-shrink:0;">' + (labels[k] || k) + '</span>' +
                            '<div style="flex:1;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;">' +
                                '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:5px;"></div>' +
                            '</div>' +
                            '<span style="font-size:12px;font-weight:600;color:#374151;width:50px;text-align:right;">' + v + '</span>' +
                            '<span style="font-size:11px;color:#9ca3af;width:30px;text-align:right;">' + (w*100).toFixed(0) + '%</span>' +
                        '</div>';
                });
                html += '</div>';

                // ML Predictions
                var ml = p.ml_predictions || {};
                var preds = ml.predictions || {};
                var predKeys = Object.keys(preds);
                if (predKeys.length > 0) {
                    html += '<details style="font-size:12px;margin-bottom:6px;"><summary style="cursor:pointer;color:#6366f1;font-weight:500;">Predictions IA (' + predKeys.length + ')</summary>';
                    predKeys.forEach(function(task){
                        var r = preds[task];
                        if (r && r.label) {
                            html += '<div style="display:flex;justify-content:space-between;padding:3px 10px;background:#eef2ff;margin:3px 0;border-radius:4px;font-size:12px;">' +
                                '<span>' + task + '</span><span><strong>' + r.label + '</strong> (' + r.confidence + '%)</span></div>';
                        }
                    });
                    html += '</details>';
                }

                // Conformite
                var conf = p.conformite || {};
                if (conf.risk_level) {
                    var riskColors = { Faible: ['#bbf7d0','#059669'], Moyen: ['#fde68a','#d97706'], Eleve: ['#fecaca','#ef4444'], inconnu: ['#e5e7eb','#6b7280'] };
                    var rc = riskColors[conf.risk_level] || riskColors['inconnu'];
                    html += '<div style="border:1px solid ' + rc[0] + ';border-radius:8px;padding:10px;margin-top:6px;background:#fafafa;">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                        '<span style="font-weight:600;font-size:13px;color:#374151;">Conformite</span>' +
                        '<span style="background:' + rc[0] + ';color:' + rc[1] + ';font-weight:700;font-size:12px;padding:3px 12px;border-radius:10px;">' + escapeHtml(conf.risk_level) + '</span></div>';
                    if (conf.classification) {
                        html += '<div style="font-size:13px;color:#374151;margin-bottom:4px;"><strong>Classification :</strong> ' + escapeHtml(conf.classification) + '</div>';
                    }
                    if (conf.key_points && conf.key_points.length > 0) {
                        html += '<ul style="margin:4px 0 0 0;padding-left:16px;font-size:12px;color:#6b7280;line-height:1.5;">';
                        conf.key_points.forEach(function(kp){
                            html += '<li>' + escapeHtml(kp) + '</li>';
                        });
                        html += '</ul>';
                    }
                    if (conf.details) {
                        html += '<div style="font-size:12px;color:#9ca3af;margin-top:4px;">' + escapeHtml(conf.details) + '</div>';
                    }
                    html += '</div>';
                }

                html += '</div>';
            });
            html += '</div>';

            // Resume MCDM
            var mcdm = data.mcdm || {};
            html += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;margin-top:14px;font-size:13px;color:#374151;">' +
                '<strong>Methode :</strong> ' + (mcdm.method || 'WSM').toUpperCase() +
                ' &nbsp;|&nbsp; <strong>Poids :</strong> ' + (mcdm.weights_used ? Object.values(mcdm.weights_used).map(function(w){ return (w*100).toFixed(0)+'%'; }).join(' / ') : '') +
                '</div>';
        }

        document.getElementById('taxoRecomResult').innerHTML = html;
        document.getElementById('taxoRecomResult').style.display = 'block';
        document.getElementById('taxoRecomResult').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }).catch(function(){
        document.getElementById('taxoRecomLoader').style.display = 'none';
        document.getElementById('btnRecomRun').disabled = false;
        document.getElementById('taxoRecomResult').innerHTML = '<p style="color:#ef4444;">Erreur lors de l\'analyse.</p>';
        document.getElementById('taxoRecomResult').style.display = 'block';
    });
}
</script>

</body>
</html>
